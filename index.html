<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BSP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #05070d;
      color: white;
      padding-bottom: 96px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("bsp.png") center/cover no-repeat;
      filter: blur(22px);
      opacity: 0.22;
      transform: scale(1.18);
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(190,0,255,.35), transparent 35%),
        linear-gradient(to bottom, rgba(5,7,13,.72), #05070d);
      z-index: -1;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: #05070d;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .loader-logo {
      width: 92px;
      height: 92px;
      border-radius: 26px;
      background: url("bsp.png") center/cover no-repeat;
      box-shadow: 0 0 45px rgba(190, 0, 255, .75);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .86; }
    }

    .app {
      display: none;
      animation: pageDrop .9s ease both;
    }

    @keyframes pageDrop {
      from { opacity: 0; transform: translateY(-55px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      height: 330px;
      position: relative;
      background:
        linear-gradient(to bottom, rgba(5,7,13,.05), #05070d 96%),
        url("bsp.png") center/cover no-repeat;
      overflow: hidden;
      animation: pageDrop .9s ease both;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(189,0,255,.25), transparent 32%),
        linear-gradient(to bottom, rgba(0,0,0,.15), #05070d);
      backdrop-filter: blur(2px);
    }

    .hero-glass {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 22px 16px;
      border-radius: 26px;
      background: rgba(8, 13, 24, .76);
      border: 1px solid rgba(190,0,255,.38);
      backdrop-filter: blur(16px);
      z-index: 2;
      box-shadow:
        0 0 28px rgba(190,0,255,.3),
        0 20px 55px rgba(0,0,0,.45);
      text-align: center;
    }

    .hero-title {
      font-size: 58px;
      font-weight: 900;
      line-height: .95;
      margin-bottom: 12px;
      color: transparent;
      background: linear-gradient(90deg, #8b00ff, #ff4dff, #ffffff, #b400ff, #8b00ff);
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 12px rgba(180,0,255,.95),
        0 0 32px rgba(180,0,255,.75),
        0 0 60px rgba(180,0,255,.5);
      animation: neonTextMove 2.5s linear infinite, textSlideIn .9s ease both;
    }

    .hero-sub {
      color: #ff78ff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(255,80,255,.9),
        0 0 24px rgba(180,0,255,.7);
      animation: neonTextMove 2.8s linear infinite, textSlideIn 1.1s ease both;
    }

    @keyframes neonTextMove {
      from { background-position: 0%; }
      to { background-position: 300%; }
    }

    @keyframes textSlideIn {
      from { opacity: 0; transform: translateX(-55px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .content {
      padding: 14px 16px 0;
      animation: contentDrop 1s ease both;
      animation-delay: .15s;
    }

    @keyframes contentDrop {
      from { opacity: 0; transform: translateY(-35px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .stat {
      width: 170px;
      padding: 16px 10px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.04));
      border: 1px solid rgba(190,0,255,.32);
      text-align: center;
      box-shadow: 0 0 24px rgba(190,0,255,.18);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      color: #5de4ff;
    }

    .stat span {
      font-size: 11px;
      color: #8da3b6;
      font-weight: 900;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .title {
      flex: 1;
      font-size: 22px;
      font-weight: 900;
    }

    .title span {
      color: #00d9ff;
      font-size: 13px;
    }

    .circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(190,0,255,.3);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #b8d9ff;
      box-shadow: 0 0 18px rgba(190,0,255,.18);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 50px;
      padding: 0 14px;
      border-radius: 18px;
      background: rgba(16,24,39,.86);
      border: 1px solid rgba(190,0,255,.24);
      margin-bottom: 16px;
      color: #7f93aa;
      box-shadow: 0 0 22px rgba(190,0,255,.12);
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 15px;
    }

    .podium {
      display: grid;
      grid-template-columns: 1fr 1.15fr 1fr;
      align-items: end;
      gap: 9px;
      margin-bottom: 18px;
    }

    .podium-card {
      border-radius: 18px;
      padding: 12px 8px;
      text-align: center;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
    }

    .podium-card.first {
      padding-top: 22px;
      background: linear-gradient(160deg, rgba(255,211,66,.18), rgba(255,255,255,.06));
      border-color: rgba(255,211,66,.25);
    }

    .podium-rank { font-size: 22px; margin-bottom: 5px; }
    .podium-name { font-size: 12px; font-weight: 900; }
    .podium-votes { margin-top: 4px; font-size: 11px; color: #9fb4c8; }

    .plug-card {
      display: grid;
      grid-template-columns: 38% 1fr;
      gap: 12px;
      min-height: 160px;
      background: linear-gradient(145deg, rgba(17,24,39,.95), rgba(7,11,18,.95));
      border: 1px solid rgba(190,0,255,.22);
      border-radius: 22px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow:
        0 0 22px rgba(190,0,255,.12),
        0 15px 35px rgba(0,0,0,.35);
      animation: cardIn .45s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .plug-img {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      background:
        radial-gradient(circle at 30% 20%, rgba(180,0,255,.85), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(0,217,255,.75), transparent 30%),
        #121827;
      position: relative;
    }

    .rank, .vote-pill {
      position: absolute;
      background: rgba(0,0,0,.72);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .rank { top: 8px; left: 8px; }
    .vote-pill { right: 8px; bottom: 8px; }

    .plug-info {
      padding: 12px 12px 12px 0;
      text-align: left;
    }

    .plug-name {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
    }

    .green { background: rgba(0,255,170,.12); color: #28ffb4; }
    .blue { background: rgba(0,210,255,.13); color: #5de4ff; }

    .desc {
      font-size: 12px;
      color: #9badc2;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #b400ff, #00d9ff);
    }

    .btn {
      display: block;
      text-align: center;
      color: #e9fbff;
      font-size: 12px;
      font-weight: 900;
      padding: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #008cff, #00d9ff);
      box-shadow: 0 8px 20px rgba(0,217,255,.22);
      border: none;
      width: 100%;
    }

    .empty {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #9badc2;
      text-align: center;
    }

    .profile, .networks {
      display: none;
      min-height: 100vh;
      padding-bottom: 96px;
      animation: pageDrop .7s ease both;
    }

    .profile-hero {
      height: 330px;
      position: relative;
      background: #111827;
      background-size: cover;
      background-position: center;
    }

    .profile-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.05), #05070d 92%);
    }

    .back-btn {
      position: absolute;
      top: 18px;
      left: 16px;
      z-index: 3;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.5);
      color: white;
      font-size: 20px;
    }

    .profile-content {
      padding: 0 16px 20px;
      margin-top: -70px;
      position: relative;
      z-index: 4;
    }

    .profile-card {
      border-radius: 26px;
      padding: 18px;
      background: rgba(13,20,32,.9);
      border: 1px solid rgba(190,0,255,.28);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }

    .profile-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .profile-meta {
      color: #9fc7dd;
      font-size: 13px;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .profile-desc {
      color: #c5d1dd;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .link-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .link-btn {
      display: block;
      text-decoration: none;
      color: white;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(190,0,255,.22);
      font-weight: 900;
      text-align: center;
    }

    .networks {
      padding: 20px 16px 100px;
    }

    .networks h2 {
      margin-top: 20px;
      font-size: 26px;
    }

    .bottom-nav {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      height: 66px;
      border-radius: 28px;
      background: rgba(13,20,32,.92);
      border: 1px solid rgba(190,0,255,.38);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      align-items: center;
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 24px rgba(190,0,255,.35),
        0 12px 40px rgba(0,0,0,.55);
      z-index: 50;
    }

    .nav {
      color: #8ca6bd;
      text-align: center;
      font-size: 31px;
      text-decoration: none;
      border: none;
      background: transparent;
    }

    .nav.active {
      color: #00d9ff;
      text-shadow: 0 0 18px #00d9ff;
    }
  </style>
</head>

<body>

  <div class="loading" id="loading">
    <div class="loader-logo"></div>
    <p>Chargement de BSP...</p>
  </div>

  <main class="app" id="app">

    <section class="hero">
      <div class="hero-glass">
        <div class="hero-title">BSP 🔌</div>
        <div class="hero-sub">La référence numéro 1 pour trouver ta connexion 🎖️</div>
      </div>
    </section>

    <section class="content">

      <div class="stats">
        <div class="stat"><strong id="plugCount">0</strong><span>PLUGS</span></div>
      </div>

      <div class="top-row">
        <div class="title">Classement <span id="resultCount">0 résultat</span></div>
        <div class="circle">🏆</div>
      </div>

      <div class="search">
        🔎
        <input id="searchInput" placeholder="Rechercher par nom, ville ou secteur..." />
      </div>

      <div class="podium" id="podium"></div>

      <div id="plugList"></div>

    </section>
  </main>

  <section class="profile" id="profile"></section>

  <section class="networks" id="networks">
    <h2>🌍 Nos réseaux</h2>

    <a class="link-btn" href="https://instagram.com/booskaplugofficiel">📸 Instagram</a>
    <a class="link-btn" href="https://callup.luffa.im/c/Rh8K8YR2TNu">🟣 Luffa</a>
    <a class="link-btn" href="https://tato.im/booskaplug1">🥔 Potato</a>
  </section>

  <nav class="bottom-nav">
    <button class="nav active" id="navRanking">🏆</button>
    <button class="nav" id="navNetworks">🌍</button>
  </nav>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#05070d");
    tg.setBackgroundColor("#05070d");

    const API_URL = "https://booskabot.onrender.com/plugs";
    let allPlugs = [];

    window.onload = async () => {
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      }, 800);

      await loadPlugs();
    };

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadPlugs() {
      try {
        const res = await fetch(API_URL);
        allPlugs = await res.json();

        renderPlugs(allPlugs);
        renderPodium(allPlugs);
      } catch (error) {
        document.getElementById("plugList").innerHTML =
          `<div class="empty">Impossible de charger les plugs pour le moment.</div>`;
      }
    }

    function showRanking() {
      document.getElementById("app").style.display = "block";
      document.getElementById("profile").style.display = "none";
      document.getElementById("networks").style.display = "none";

      document.getElementById("navRanking").classList.add("active");
      document.getElementById("navNetworks").classList.remove("active");
    }

    function showNetworks() {
      document.getElementById("app").style.display = "none";
      document.getElementById("profile").style.display = "none";
      document.getElementById("networks").style.display = "block";

      document.getElementById("navRanking").classList.remove("active");
      document.getElementById("navNetworks").classList.add("active");
    }

    function renderPodium(plugs) {
      const podium = document.getElementById("podium");
      const top = plugs.slice(0, 3);

      if (!top.length) {
        podium.innerHTML = "";
        return;
      }

      const second = top[1];
      const first = top[0];
      const third = top[2];

      podium.innerHTML = `
        <div class="podium-card">
          <div class="podium-rank">🥈</div>
          <div class="podium-name">${second ? escapeHtml(second.name) : "-"}</div>
          <div class="podium-votes">${second ? second.votes || 0 : 0} vote</div>
        </div>
        <div class="podium-card first">
          <div class="podium-rank">🥇</div>
          <div class="podium-name">${first ? escapeHtml(first.name) : "-"}</div>
          <div class="podium-votes">${first ? first.votes || 0 : 0} vote</div>
        </div>
        <div class="podium-card">
          <div class="podium-rank">🥉</div>
          <div class="podium-name">${third ? escapeHtml(third.name) : "-"}</div>
          <div class="podium-votes">${third ? third.votes || 0 : 0} vote</div>
        </div>
      `;
    }

    function renderPlugs(plugs) {
      const list = document.getElementById("plugList");

      document.getElementById("plugCount").textContent = plugs.length;
      document.getElementById("resultCount").textContent =
        `${plugs.length} ${plugs.length > 1 ? "résultats" : "résultat"}`;

      if (!plugs.length) {
        list.innerHTML = `<div class="empty">Aucun plug enregistré pour le moment.</div>`;
        return;
      }

      list.innerHTML = plugs.map((plug, index) => {
        const imageStyle = plug.image
          ? `style="background: url('${escapeHtml(plug.image)}') center/cover no-repeat;"`
          : "";

        const emoji = plug.image ? "" : "🔥";

        return `
          <article class="plug-card" data-id="${plug.id}" data-name="${escapeHtml(`${plug.name} ${plug.city} ${plug.sector}`)}">
            <div class="plug-img" ${imageStyle}>
              <div class="rank">#${index + 1}</div>
              ${emoji}
              <div class="vote-pill">🗳️ ${plug.votes || 0}</div>
            </div>

            <div class="plug-info">
              <div class="plug-name">${escapeHtml(plug.name)}</div>

              <div class="badges">
                <span class="tag green">${escapeHtml(plug.sector || "SECTEUR")}</span>
                <span class="tag blue">${escapeHtml(plug.city || "FRANCE")}</span>
              </div>

              <div class="desc">${escapeHtml(plug.description || "Aucune description pour le moment.")}</div>

              <div class="progress">
                <span style="width: ${Math.min(100, (plug.votes || 0) * 10 || 8)}%"></span>
              </div>

              <button class="btn" onclick="openProfile('${plug.id}')">VOIR LES INFOS →</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function openProfile(id) {
      const plug = allPlugs.find(p => String(p.id) === String(id));
      if (!plug) return;

      document.getElementById("app").style.display = "none";
      document.getElementById("networks").style.display = "none";

      const profile = document.getElementById("profile");
      profile.style.display = "block";

      const links = [];

      if (plug.telegram || plug.link) links.push(`<a class="link-btn" href="${escapeHtml(plug.telegram || plug.link)}">🔗 Canal Telegram</a>`);
      if (plug.instagram) links.push(`<a class="link-btn" href="${escapeHtml(plug.instagram)}">📸 Instagram</a>`);
      if (plug.potato) links.push(`<a class="link-btn" href="${escapeHtml(plug.potato)}">🥔 Potato</a>`);
      if (plug.luffa) links.push(`<a class="link-btn" href="${escapeHtml(plug.luffa)}">🟣 Luffa</a>`);

      profile.innerHTML = `
        <div class="profile-hero" style="${plug.image ? `background-image: url('${escapeHtml(plug.image)}')` : ""}">
          <button class="back-btn" onclick="showRanking()">‹</button>
        </div>

        <div class="profile-content">
          <div class="profile-card">
            <div class="profile-title">${escapeHtml(plug.name)}</div>
            <div class="profile-meta">📍 ${escapeHtml(plug.city || "France")} • 📌 ${escapeHtml(plug.sector || "Secteur non renseigné")} • 🗳️ ${plug.votes || 0} vote</div>
            <div class="profile-desc">${escapeHtml(plug.description || "Aucune description pour le moment.")}</div>

            <div class="link-grid">
              ${links.length ? links.join("") : `<div class="empty">Aucun lien renseigné.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    document.getElementById("searchInput").addEventListener("input", () => {
      const value = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allPlugs.filter(plug => {
        return `${plug.name} ${plug.city} ${plug.sector}`.toLowerCase().includes(value);
      });

      renderPlugs(filtered);
      renderPodium(filtered);
    });

    document.getElementById("navRanking").addEventListener("click", showRanking);
    document.getElementById("navNetworks").addEventListener("click", showNetworks);
  </script>

</body>
</html>
