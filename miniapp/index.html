<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BOOSKABOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #05070d;
      color: white;
      padding-bottom: 96px;
      overflow-x: hidden;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: #05070d;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .loader-logo {
      width: 92px;
      height: 92px;
      border-radius: 26px;
      background: url("bsp.png") center/cover no-repeat;
      box-shadow: 0 0 45px rgba(190, 0, 255, .75);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .86; }
    }

    .app { display: none; animation: fade .45s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .hero {
      height: 260px;
      position: relative;
      background:
        linear-gradient(to bottom, rgba(5,7,13,.05), #05070d 96%),
        url("bsp.png") center/cover no-repeat;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(189,0,255,.12), transparent 30%),
        linear-gradient(to bottom, transparent, #05070d);
    }

    .hero-glass {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 12px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(8, 13, 24, .72);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(14px);
      z-index: 2;
      box-shadow: 0 20px 55px rgba(0,0,0,.45);
    }

    .hero-title {
      font-size: 25px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 6px;
    }

    .hero-sub {
      color: #9fc7dd;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .content { padding: 14px 16px 0; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 12px 8px;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.09);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      color: #5de4ff;
    }

    .stat span {
      font-size: 10px;
      color: #8da3b6;
      font-weight: 800;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .title {
      flex: 1;
      font-size: 22px;
      font-weight: 900;
    }

    .title span {
      color: #00d9ff;
      font-size: 13px;
    }

    .circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #b8d9ff;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 48px;
      padding: 0 14px;
      border-radius: 17px;
      background: #101827;
      border: 1px solid rgba(255,255,255,.08);
      margin-bottom: 16px;
      color: #7f93aa;
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 15px;
    }

    .podium {
      display: grid;
      grid-template-columns: 1fr 1.15fr 1fr;
      align-items: end;
      gap: 9px;
      margin-bottom: 18px;
    }

    .podium-card {
      border-radius: 18px;
      padding: 12px 8px;
      text-align: center;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
    }

    .podium-card.first {
      padding-top: 22px;
      background: linear-gradient(160deg, rgba(255,211,66,.18), rgba(255,255,255,.06));
      border-color: rgba(255,211,66,.25);
    }

    .podium-rank { font-size: 22px; margin-bottom: 5px; }
    .podium-name { font-size: 12px; font-weight: 900; }
    .podium-votes { margin-top: 4px; font-size: 11px; color: #9fb4c8; }

    .plug-card {
      display: grid;
      grid-template-columns: 38% 1fr;
      gap: 12px;
      min-height: 160px;
      background: linear-gradient(145deg, #111827, #070b12);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 22px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,.35);
      animation: cardIn .35s ease;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .plug-img {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      background:
        radial-gradient(circle at 30% 20%, rgba(180,0,255,.85), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(0,217,255,.75), transparent 30%),
        #121827;
      position: relative;
    }

    .rank, .rating {
      position: absolute;
      background: rgba(0,0,0,.68);
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
    }

    .rank { top: 8px; left: 8px; }
    .rating { right: 8px; bottom: 8px; }

    .plug-info {
      padding: 12px 12px 12px 0;
      text-align: left;
    }

    .plug-name {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 7px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
    }

    .green { background: rgba(0,255,170,.12); color: #28ffb4; }
    .orange { background: rgba(255,155,55,.13); color: #ffb05c; }
    .blue { background: rgba(0,210,255,.13); color: #5de4ff; }

    .desc {
      font-size: 12px;
      color: #9badc2;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .progress {
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #b400ff, #00d9ff);
    }

    .btn {
      display: block;
      text-align: center;
      text-decoration: none;
      color: #e9fbff;
      font-size: 12px;
      font-weight: 900;
      padding: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #008cff, #00d9ff);
      box-shadow: 0 8px 20px rgba(0,217,255,.22);
    }

    .empty {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #9badc2;
      text-align: center;
    }

    .bottom-nav {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      height: 64px;
      border-radius: 25px;
      background: rgba(13,20,32,.92);
      border: 1px solid rgba(255,255,255,.12);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,.55);
      z-index: 50;
    }

    .nav {
      color: #8ca6bd;
      text-align: center;
      font-size: 23px;
      text-decoration: none;
    }

    .nav.active {
      color: #00d9ff;
      text-shadow: 0 0 18px #00d9ff;
    }
  </style>
</head>

<body>

  <div class="loading" id="loading">
    <div class="loader-logo"></div>
    <p>Chargement de BOOSKABOT...</p>
  </div>

  <main class="app" id="app">

    <section class="hero">
      <div class="hero-glass">
        <div class="hero-title">BOOSKABOT<br>Plug Battle</div>
        <div class="hero-sub">classement • votes • réseaux officiels</div>
      </div>
    </section>

    <section class="content">

      <div class="stats">
        <div class="stat"><strong id="plugCount">0</strong><span>PLUGS</span></div>
        <div class="stat"><strong id="voteCount">0</strong><span>VOTES</span></div>
        <div class="stat"><strong>LIVE</strong><span>STATUS</span></div>
      </div>

      <div class="top-row">
        <div class="title">Plugs Certifiés <span id="resultCount">0 résultat</span></div>
        <div class="circle">⚙️</div>
        <div class="circle">☰</div>
        <div class="circle">🏆</div>
      </div>

      <div class="search">
        🔎
        <input id="searchInput" placeholder="Rechercher par nom ou ville..." />
      </div>

      <div class="podium" id="podium"></div>

      <div id="plugList"></div>

    </section>

    <nav class="bottom-nav">
      <a class="nav active" href="#">🏠</a>
      <a class="nav" href="#">🏆</a>
      <a class="nav" href="https://instagram.com/booskaplugofficiel">📸</a>
      <a class="nav" href="https://callup.luffa.im/c/Rh8K8YR2TNu">🟣</a>
      <a class="nav" href="https://tato.im/booskaplug1">🥔</a>
    </nav>

  </main>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#05070d");
    tg.setBackgroundColor("#05070d");

    const API_URL = "https://booskabot.onrender.com/plugs";
    let allPlugs = [];

    window.onload = async () => {
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      }, 800);

      await loadPlugs();
    };

    async function loadPlugs() {
      try {
        const res = await fetch(API_URL);
        allPlugs = await res.json();

        renderPlugs(allPlugs);
        renderPodium(allPlugs);
      } catch (error) {
        document.getElementById("plugList").innerHTML =
          `<div class="empty">Impossible de charger les plugs pour le moment.</div>`;
      }
    }

    function renderPodium(plugs) {
      const podium = document.getElementById("podium");
      const top = plugs.slice(0, 3);

      if (!top.length) {
        podium.innerHTML = "";
        return;
      }

      const second = top[1];
      const first = top[0];
      const third = top[2];

      podium.innerHTML = `
        <div class="podium-card">
          <div class="podium-rank">🥈</div>
          <div class="podium-name">${second ? second.name : "-"}</div>
          <div class="podium-votes">${second ? second.votes || 0 : 0} vote</div>
        </div>
        <div class="podium-card first">
          <div class="podium-rank">🥇</div>
          <div class="podium-name">${first ? first.name : "-"}</div>
          <div class="podium-votes">${first ? first.votes || 0 : 0} vote</div>
        </div>
        <div class="podium-card">
          <div class="podium-rank">🥉</div>
          <div class="podium-name">${third ? third.name : "-"}</div>
          <div class="podium-votes">${third ? third.votes || 0 : 0} vote</div>
        </div>
      `;
    }

    function renderPlugs(plugs) {
      const list = document.getElementById("plugList");

      document.getElementById("plugCount").textContent = plugs.length;
      document.getElementById("resultCount").textContent =
        `${plugs.length} ${plugs.length > 1 ? "résultats" : "résultat"}`;

      if (!plugs.length) {
        list.innerHTML = `<div class="empty">Aucun plug enregistré pour le moment.</div>`;
        return;
      }

      list.innerHTML = plugs.map((plug, index) => {
        const imageStyle = plug.image
          ? `style="background: url('${plug.image}') center/cover no-repeat;"`
          : "";

        const emoji = plug.image ? "" : "🔥";

        return `
          <article class="plug-card" data-name="${plug.name} ${plug.city}">
            <div class="plug-img" ${imageStyle}>
              <div class="rank">#${index + 1}</div>
              ${emoji}
              <div class="rating">⭐ 5.0</div>
            </div>

            <div class="plug-info">
              <div class="plug-name">${plug.name}</div>

              <div class="badges">
                <span class="tag green">MEET-UP</span>
                <span class="tag orange">LIVRAISON</span>
                <span class="tag blue">${plug.city || "FRANCE 🇫🇷"}</span>
              </div>

              <div class="desc">Plug ajouté depuis le panel admin BOOSKABOT.</div>

              <div class="progress">
                <span style="width: 100%"></span>
              </div>

              <a class="btn" href="${plug.link || "#"}">VOIR LES INFOS →</a>
            </div>
          </article>
        `;
      }).join("");
    }

    document.getElementById("searchInput").addEventListener("input", () => {
      const value = document.getElementById("searchInput").value.toLowerCase();

      const filtered = allPlugs.filter(plug => {
        return `${plug.name} ${plug.city}`.toLowerCase().includes(value);
      });

      renderPlugs(filtered);
    });
  </script>

</body>
</html>
