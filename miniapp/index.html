<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BOOSKABOT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .loading {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 6px solid #333;
      border-top: 6px solid #00ffcc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 15px;
      opacity: 0.8;
    }

    .app {
      display: none;
    }

    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #1a1a1a;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 80%;
      border-radius: 12px;
      background: #2b2b2b;
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="loading" id="loading">
    <div class="loader"></div>
    <div class="loading-text">Chargement...</div>
  </div>

  <div class="app" id="app">
    <div class="header">👋 BOOSKABOT MINI APP</div>

    <a class="btn" href="#">🗳️ Votes</a>
    <a class="btn" href="https://instagram.com/booskaplugofficiel">📸 Instagram</a>
    <a class="btn" href="https://callup.luffa.im/c/Rh8K8YR2TNu">🟣 Luffa</a>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    window.onload = () => {
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      }, 1200);
    };
  </script>

</body>
</html>
