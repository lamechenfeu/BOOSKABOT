<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BSP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #05070d;
      --card: rgba(13, 20, 32, .88);
      --card2: rgba(255, 255, 255, .07);
      --purple: #b400ff;
      --pink: #ff4dff;
      --cyan: #00d9ff;
      --text2: #9badc2;
      --border: rgba(190,0,255,.34);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: white;
      padding-bottom: 104px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -50px;
      background: url("bsp.png") center/cover no-repeat;
      filter: blur(24px);
      opacity: 0.23;
      transform: scale(1.18);
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 24% 8%, rgba(190,0,255,.38), transparent 32%),
        radial-gradient(circle at 84% 42%, rgba(0,217,255,.16), transparent 28%),
        linear-gradient(to bottom, rgba(5,7,13,.66), #05070d 88%);
      z-index: -2;
      animation: bgGlow 7s ease-in-out infinite alternate;
    }

    @keyframes bgGlow {
      from { filter: hue-rotate(0deg) brightness(1); }
      to { filter: hue-rotate(12deg) brightness(1.12); }
    }

    .loading {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 42%, rgba(180,0,255,.22), transparent 28%),
    linear-gradient(to bottom, #05070d, #02030a);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.loader-orbit {
  position: relative;
  width: 150px;
  height: 150px;
  display: grid;
  place-items: center;
}

.loader-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.08);
  border-top-color: #d000ff;
  border-right-color: #00d9ff;
  box-shadow:
    0 0 24px rgba(180,0,255,.55),
    inset 0 0 22px rgba(0,217,255,.12);
  animation: spin 1.15s linear infinite;
}

.loader-ring::after {
  content: "";
  position: absolute;
  inset: 12px;
  border-radius: 50%;
  border: 1px dashed rgba(0,217,255,.35);
  animation: spinReverse 2.4s linear infinite;
}

.loader-logo {
  width: 86px;
  height: 86px;
  border-radius: 26px;
  background: url("bsp.png") center/cover no-repeat;
  box-shadow:
    0 0 28px rgba(190,0,255,.9),
    0 0 70px rgba(0,217,255,.24);
  animation: logoPulse 1.35s infinite ease-in-out;
  z-index: 2;
}

.loader-title {
  margin-top: 16px;
  font-size: 42px;
  font-weight: 900;
  color: transparent;
  background: linear-gradient(90deg, #8b00ff, #ff4dff, #ffffff, #00d9ff);
  background-size: 300%;
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow: 0 0 28px rgba(180,0,255,.7);
  animation: neonTextMove 2.2s linear infinite;
}

.loader-text {
  margin: 8px 0 18px;
  color: #cfeaff;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .3px;
}

.loader-bar {
  width: 190px;
  height: 7px;
  border-radius: 999px;
  background: rgba(255,255,255,.08);
  overflow: hidden;
  box-shadow: 0 0 18px rgba(180,0,255,.25);
}

.loader-bar span {
  display: block;
  width: 45%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #b400ff, #00d9ff, #ffffff);
  animation: loadingBar 1.2s ease-in-out infinite;
}

.spark {
  position: absolute;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #00d9ff;
  box-shadow: 0 0 16px #00d9ff;
}

.s1 { top: 12px; right: 28px; animation: sparkMove 1.7s infinite ease-in-out; }
.s2 { bottom: 20px; left: 22px; animation: sparkMove 2.1s infinite ease-in-out reverse; }
.s3 { top: 66px; left: 6px; background: #ff4dff; box-shadow: 0 0 16px #ff4dff; animation: sparkMove 1.9s infinite ease-in-out; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes spinReverse {
  to { transform: rotate(-360deg); }
}

@keyframes logoPulse {
  0%, 100% {
    transform: scale(1);
    filter: brightness(1);
  }
  50% {
    transform: scale(1.08);
    filter: brightness(1.25);
  }
}

@keyframes loadingBar {
  0% { transform: translateX(-110%); }
  100% { transform: translateX(240%); }
}

@keyframes sparkMove {
  0%, 100% { transform: scale(1) translateY(0); opacity: .55; }
  50% { transform: scale(1.8) translateY(-8px); opacity: 1; }
}

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .86; }
    }

    .app { display: none; animation: pageDrop .8s ease both; }
    @keyframes pageDrop { from { opacity: 0; transform: translateY(-46px); } to { opacity: 1; transform: translateY(0); } }

    .hero {
      height: 330px;
      position: relative;
      background:
        linear-gradient(to bottom, rgba(5,7,13,.05), #05070d 96%),
        url("bsp.png") center/cover no-repeat;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,77,255,.52), transparent 68%);
      filter: blur(18px);
      animation: halo 2.8s ease-in-out infinite alternate;
      z-index: 1;
    }

    @keyframes halo {
      from { opacity: .55; transform: translate(-50%, -50%) scale(.92); }
      to { opacity: .95; transform: translate(-50%, -50%) scale(1.08); }
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(189,0,255,.25), transparent 32%),
        linear-gradient(to bottom, rgba(0,0,0,.15), #05070d);
      backdrop-filter: blur(2px);
      z-index: 1;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px var(--pink);
      z-index: 2;
      opacity: .65;
      animation: floatSpark 4s ease-in-out infinite;
    }
    .s1 { left: 15%; top: 26%; animation-delay: .1s; }
    .s2 { left: 76%; top: 19%; animation-delay: .8s; }
    .s3 { left: 83%; top: 62%; animation-delay: 1.4s; }
    .s4 { left: 24%; top: 70%; animation-delay: 2s; }
    @keyframes floatSpark { 50% { transform: translateY(-18px) scale(1.5); opacity: 1; } }

    .hero-glass {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 18px;
      padding: 22px 16px;
      border-radius: 28px;
      background: rgba(8, 13, 24, .76);
      border: 1px solid rgba(190,0,255,.44);
      backdrop-filter: blur(18px);
      z-index: 3;
      box-shadow: 0 0 32px rgba(190,0,255,.38), 0 20px 55px rgba(0,0,0,.45), inset 0 0 24px rgba(255,255,255,.035);
      text-align: center;
    }

    .hero-title {
      font-size: 58px;
      font-weight: 900;
      line-height: .95;
      margin-bottom: 12px;
      color: transparent;
      background: linear-gradient(90deg, #8b00ff, #ff4dff, #ffffff, #b400ff, #8b00ff);
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 12px rgba(180,0,255,.95), 0 0 32px rgba(180,0,255,.75), 0 0 60px rgba(180,0,255,.5);
      animation: neonTextMove 2.5s linear infinite, textSlideIn .9s ease both;
    }

    .hero-sub, .hero-line {
      color: #ff78ff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,80,255,.9), 0 0 24px rgba(180,0,255,.7);
      animation: neonTextMove 2.8s linear infinite, textSlideIn 1.1s ease both;
    }
    .hero-line { margin-top: 8px; color: #5de4ff; font-size: 11px; }
    @keyframes neonTextMove { from { background-position: 0%; } to { background-position: 300%; } }
    @keyframes textSlideIn { from { opacity: 0; transform: translateX(-55px); } to { opacity: 1; transform: translateX(0); } }

    .content { padding: 14px 16px 0; animation: contentDrop 1s ease both; animation-delay: .15s; }
    @keyframes contentDrop { from { opacity: 0; transform: translateY(-35px); } to { opacity: 1; transform: translateY(0); } }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 15px 8px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.04));
      border: 1px solid rgba(190,0,255,.32);
      text-align: center;
      box-shadow: 0 0 24px rgba(190,0,255,.18), inset 0 0 20px rgba(255,255,255,.025);
    }
    .stat .ico { font-size: 17px; margin-bottom: 2px; }
    .stat strong { display: block; font-size: 25px; color: #5de4ff; }
    .stat span { font-size: 10px; color: #8da3b6; font-weight: 900; }

    .top-row { display: flex; align-items: center; gap: 10px; margin: 6px 0 14px; }
    .title { flex: 1; font-size: 22px; font-weight: 900; }
    .title span { color: var(--cyan); font-size: 13px; }
    .circle {
      width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.08);
      border: 1px solid rgba(190,0,255,.34); display: flex; justify-content: center; align-items: center;
      color: #b8d9ff; box-shadow: 0 0 22px rgba(190,0,255,.28);
    }

    .search {
      display: flex; align-items: center; gap: 10px; height: 52px; padding: 0 15px; border-radius: 18px;
      background: rgba(16,24,39,.88); border: 1px solid rgba(190,0,255,.28); margin-bottom: 16px;
      color: #7f93aa; box-shadow: 0 0 22px rgba(190,0,255,.13);
    }
    .search input { flex: 1; border: none; outline: none; background: transparent; color: white; font-size: 15px; }

    .podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; align-items: end; gap: 9px; margin-bottom: 18px; }
    .podium-card {
      border-radius: 20px; padding: 13px 8px; text-align: center; background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12); box-shadow: 0 10px 26px rgba(0,0,0,.28);
    }
    .podium-card.first { padding-top: 25px; background: linear-gradient(160deg, rgba(255,211,66,.20), rgba(180,0,255,.08)); border-color: rgba(255,211,66,.35); box-shadow: 0 0 30px rgba(255,211,66,.12); }
    .podium-rank { font-size: 25px; margin-bottom: 5px; }
    .podium-name { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-stars { font-size: 11px; margin-top: 4px; color: #ffd342; }
    .podium-votes { margin-top: 4px; font-size: 11px; color: #9fb4c8; }

    .plug-card {
      display: grid; grid-template-columns: 38% 1fr; gap: 12px; min-height: 166px;
      background: linear-gradient(145deg, rgba(17,24,39,.96), rgba(7,11,18,.96));
      border: 1px solid rgba(190,0,255,.26); border-radius: 24px; margin-bottom: 14px; overflow: hidden;
      box-shadow: 0 0 24px rgba(190,0,255,.14), 0 15px 35px rgba(0,0,0,.35);
      animation: cardIn .45s ease; transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }
    .plug-card:active { transform: scale(.985) translateY(1px); border-color: rgba(0,217,255,.45); box-shadow: 0 0 28px rgba(0,217,255,.16); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .plug-img {
      display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 900;
      background: radial-gradient(circle at 30% 20%, rgba(180,0,255,.85), transparent 30%), radial-gradient(circle at 70% 80%, rgba(0,217,255,.75), transparent 30%), #121827;
      position: relative;
    }
    .rank, .vote-pill, .top-badge { position: absolute; background: rgba(0,0,0,.74); padding: 5px 9px; border-radius: 999px; font-size: 11px; font-weight: 900; }
    .rank { top: 8px; left: 8px; }
    .top-badge { top: 8px; right: 8px; color: #ffd342; }
    .vote-pill { right: 8px; bottom: 8px; color: #e9fbff; }

    .plug-info { padding: 12px 12px 12px 0; text-align: left; }
    .plug-name { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
    .stars { color: #ffd342; font-size: 12px; margin-bottom: 7px; letter-spacing: .5px; }
    .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .tag { padding: 4px 8px; border-radius: 999px; font-size: 10px; font-weight: 900; }
    .green { background: rgba(0,255,170,.12); color: #28ffb4; }
    .blue { background: rgba(0,210,255,.13); color: #5de4ff; }
    .purple { background: rgba(180,0,255,.16); color: #ff78ff; }
    .desc { font-size: 12px; color: #9badc2; line-height: 1.35; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .progress { height: 7px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; margin-bottom: 10px; }
    .progress span { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #b400ff, #00d9ff); }
    .btn { display: block; text-align: center; color: #e9fbff; font-size: 12px; font-weight: 900; padding: 10px; border-radius: 999px; background: linear-gradient(90deg, #008cff, #00d9ff); box-shadow: 0 8px 20px rgba(0,217,255,.22); border: none; width: 100%; }
    .empty { padding: 18px; border-radius: 20px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: #9badc2; text-align: center; }

    .profile, .networks { display: none; min-height: 100vh; padding-bottom: 104px; animation: pageDrop .7s ease both; }
    .profile-hero { height: 330px; position: relative; background: #111827; background-size: cover; background-position: center; }
    .profile-hero::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.05), #05070d 92%); }
    .back-btn { position: absolute; top: 18px; left: 16px; z-index: 3; width: 42px; height: 42px; border-radius: 50%; border: 1px solid rgba(255,255,255,.18); background: rgba(0,0,0,.5); color: white; font-size: 20px; }
    .profile-content { padding: 0 16px 20px; margin-top: -72px; position: relative; z-index: 4; }
    .profile-card { border-radius: 28px; padding: 19px; background: rgba(13,20,32,.92); border: 1px solid rgba(190,0,255,.32); backdrop-filter: blur(14px); box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 0 26px rgba(255,255,255,.03); }
    .profile-title { font-size: 27px; font-weight: 900; margin-bottom: 6px; }
    .profile-meta { color: #9fc7dd; font-size: 13px; margin-bottom: 14px; font-weight: 800; }
    .profile-desc { color: #c5d1dd; font-size: 14px; line-height: 1.5; margin-bottom: 16px; white-space: pre-wrap; }
    .link-grid { display: grid; gap: 10px; margin-top: 12px; }
    .link-btn { display: block; text-decoration: none; color: white; padding: 14px; border-radius: 16px; background: rgba(255,255,255,.08); border: 1px solid rgba(190,0,255,.22); font-weight: 900; text-align: center; }
    .link-btn.telegram { background: rgba(0,136,204,.18); border-color: rgba(0,136,204,.35); }
    .link-btn.instagram { background: rgba(255,77,255,.15); border-color: rgba(255,77,255,.35); }
    .link-btn.potato { background: rgba(255,173,66,.14); border-color: rgba(255,173,66,.30); }
    .link-btn.luffa { background: rgba(130,80,255,.16); border-color: rgba(130,80,255,.33); }

    .networks { padding: 20px 16px 100px; }
    .networks h2 { margin-top: 20px; font-size: 26px; }

    .bottom-nav {
      position: fixed; left: 16px; right: 16px; bottom: 16px; height: 68px; border-radius: 28px;
      background: rgba(13,20,32,.92); border: 1px solid rgba(190,0,255,.42); display: grid; grid-template-columns: repeat(3, 1fr);
      align-items: center; backdrop-filter: blur(14px); box-shadow: 0 0 26px rgba(190,0,255,.38), 0 12px 40px rgba(0,0,0,.55); z-index: 50;
    }
    .nav { color: #8ca6bd; text-align: center; font-size: 28px; text-decoration: none; border: none; background: transparent; position: relative; height: 100%; }
    .nav.active { color: #00d9ff; text-shadow: 0 0 18px #00d9ff; }
    .nav.active::before { content: ""; position: absolute; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,217,255,.10); left: 50%; top: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 22px rgba(0,217,255,.25); z-index: -1; }

    @media (max-width: 360px) {
      .hero-title { font-size: 50px; }
      .stats { gap: 8px; }
      .stat strong { font-size: 22px; }
    }
  </style>
</head>

<body>
  <div class="loading" id="loading">
  <div class="loader-orbit">
    <div class="loader-ring"></div>
    <div class="loader-logo"></div>
    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
  </div>

  <div class="loader-title">BSP</div>
  <p class="loader-text">Connexion à la plateforme...</p>

  <div class="loader-bar">
    <span></span>
  </div>
</div>

  <main class="app" id="app">
    <section class="hero">
      <span class="sparkle s1"></span><span class="sparkle s2"></span><span class="sparkle s3"></span><span class="sparkle s4"></span>
      <div class="hero-glass">
        <div class="hero-title">BSP 🔌</div>
        <div class="hero-sub">La référence numéro 1 pour trouver ta connexion 🏅</div>
        <div class="hero-line">🔥 Communauté premium francophone</div>
      </div>
    </section>

    <section class="content">
      <div class="stats">
        <div class="stat"><div class="ico">🔌</div><strong id="plugCount">0</strong><span>PLUGS</span></div>
        <div class="stat"><div class="ico">🗳️</div><strong id="voteCount">0</strong><span>VOTES</span></div>
        <div class="stat"><div class="ico">👥</div><strong id="memberCount">0</strong><span>MEMBRES</span></div>
      </div>

      <div class="top-row">
        <div class="title">Classement <span id="resultCount">0 résultat</span></div>
        <div class="circle">🏆</div>
      </div>

      <div class="search">
        🔎
        <input id="searchInput" placeholder="Rechercher un plug, une ville..." />
      </div>

      <div class="podium" id="podium"></div>
      <div id="plugList"></div>
    </section>
  </main>

  <section class="profile" id="profile"></section>

  <section class="networks" id="networks">
    <h2>🌍 Nos réseaux</h2>
    <a class="link-btn instagram" href="https://instagram.com/booskaplugofficiel">📸 Instagram</a>
    <a class="link-btn luffa" href="https://callup.luffa.im/c/Rh8K8YR2TNu">🟣 Luffa</a>
    <a class="link-btn potato" href="https://tato.im/booskaplug1">🥔 Potato</a>
  </section>

  <nav class="bottom-nav">
    <button class="nav active" id="navHome">🏠</button>
    <button class="nav" id="navRanking">🏆</button>
    <button class="nav" id="navNetworks">🌍</button>
  </nav>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#05070d");
      tg.setBackgroundColor("#05070d");
    }

    const API_URL = "https://booskabot.onrender.com/plugs";
    let allPlugs = [];

    window.onload = async () => {
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      }, 800);
      await loadPlugs();
    };

    function haptic(type = "light") {
      try { tg?.HapticFeedback?.impactOccurred(type); } catch (e) {}
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(Number(value || 0));
    }

    function starsForVotes(votes) {
      const count = Math.max(1, Math.min(5, Math.ceil((votes || 0) / 5)));
      return "★".repeat(count) + "☆".repeat(5 - count);
    }

    async function loadPlugs() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now());
        allPlugs = await res.json();
        renderPlugs(allPlugs);
        renderPodium(allPlugs);
      } catch (error) {
        document.getElementById("plugList").innerHTML = `<div class="empty">Impossible de charger les plugs pour le moment.</div>`;
      }
    }

    function setActiveNav(activeId) {
      ["navHome", "navRanking", "navNetworks"].forEach(id => {
        document.getElementById(id).classList.toggle("active", id === activeId);
      });
    }

    function showRanking(scrollTop = false) {
      haptic();
      document.getElementById("app").style.display = "block";
      document.getElementById("profile").style.display = "none";
      document.getElementById("networks").style.display = "none";
      setActiveNav(scrollTop ? "navHome" : "navRanking");
      if (scrollTop) window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showNetworks() {
      haptic();
      document.getElementById("app").style.display = "none";
      document.getElementById("profile").style.display = "none";
      document.getElementById("networks").style.display = "block";
      setActiveNav("navNetworks");
    }

    function renderPodium(plugs) {
      const podium = document.getElementById("podium");
      const top = plugs.slice(0, 3);
      if (!top.length) { podium.innerHTML = ""; return; }
      const second = top[1]; const first = top[0]; const third = top[2];

      function podiumCard(plug, rank, firstClass = "") {
        return `
          <div class="podium-card ${firstClass}">
            <div class="podium-rank">${rank}</div>
            <div class="podium-name">${plug ? escapeHtml(plug.name) : "-"}</div>
            <div class="podium-stars">${plug ? starsForVotes(plug.votes || 0) : "☆☆☆☆☆"}</div>
            <div class="podium-votes">${plug ? formatNumber(plug.votes || 0) : 0} vote</div>
          </div>`;
      }

      podium.innerHTML = podiumCard(second, "🥈") + podiumCard(first, "🥇", "first") + podiumCard(third, "🥉");
    }

    function renderPlugs(plugs) {
      const list = document.getElementById("plugList");
      const totalVotes = allPlugs.reduce((sum, plug) => sum + Number(plug.votes || 0), 0);

      document.getElementById("plugCount").textContent = formatNumber(allPlugs.length);
      document.getElementById("voteCount").textContent = formatNumber(totalVotes);
      document.getElementById("memberCount").textContent = formatNumber(Math.max(allPlugs.length, totalVotes));
      document.getElementById("resultCount").textContent = `${plugs.length} ${plugs.length > 1 ? "résultats" : "résultat"}`;

      if (!plugs.length) {
        list.innerHTML = `<div class="empty">Aucun plug enregistré pour le moment.</div>`;
        return;
      }

      list.innerHTML = plugs.map((plug, index) => {
        const imageStyle = plug.image ? `style="background: url('${escapeHtml(plug.image)}') center/cover no-repeat;"` : "";
        const emoji = plug.image ? "" : "🔥";
        const votes = Number(plug.votes || 0);
        const badge = index < 3 ? "👑 TOP" : index < 10 ? "⚡ TOP 10" : "✅ BSP";

        return `
          <article class="plug-card" data-id="${escapeHtml(plug.id)}" data-name="${escapeHtml(`${plug.name} ${plug.city} ${plug.sector}`)}" onclick="openProfile('${escapeHtml(plug.id)}')">
            <div class="plug-img" ${imageStyle}>
              <div class="rank">#${index + 1}</div>
              <div class="top-badge">${badge}</div>
              ${emoji}
              <div class="vote-pill">🗳️ ${formatNumber(votes)}</div>
            </div>
            <div class="plug-info">
              <div class="plug-name">${escapeHtml(plug.name)}</div>
              <div class="stars">${starsForVotes(votes)}</div>
              <div class="badges">
                <span class="tag green">${escapeHtml(plug.sector || "SECTEUR")}</span>
                <span class="tag blue">${escapeHtml(plug.city || "FRANCE")}</span>
                <span class="tag purple">VÉRIFIÉ</span>
              </div>
              <div class="desc">${escapeHtml(plug.description || "Aucune description pour le moment.")}</div>
              <div class="progress"><span style="width: ${Math.min(100, votes * 10 || 8)}%"></span></div>
              <button class="btn" onclick="event.stopPropagation(); openProfile('${escapeHtml(plug.id)}')">VOIR LES INFOS →</button>
            </div>
          </article>`;
      }).join("");
    }

    function openProfile(id) {
      haptic("medium");
      const plug = allPlugs.find(p => String(p.id) === String(id));
      if (!plug) return;

      document.getElementById("app").style.display = "none";
      document.getElementById("networks").style.display = "none";
      setActiveNav("navRanking");

      const profile = document.getElementById("profile");
      profile.style.display = "block";

      const links = [];
      if (plug.telegram || plug.link) links.push(`<a class="link-btn telegram" href="${escapeHtml(plug.telegram || plug.link)}">🔗 Telegram</a>`);
      if (plug.instagram) links.push(`<a class="link-btn instagram" href="${escapeHtml(plug.instagram)}">📸 Instagram</a>`);
      if (plug.potato) links.push(`<a class="link-btn potato" href="${escapeHtml(plug.potato)}">🥔 Potato</a>`);
      if (plug.luffa) links.push(`<a class="link-btn luffa" href="${escapeHtml(plug.luffa)}">🟣 Luffa</a>`);

      profile.innerHTML = `
        <div class="profile-hero" style="${plug.image ? `background-image: url('${escapeHtml(plug.image)}')` : ""}">
          <button class="back-btn" onclick="showRanking(false)">‹</button>
        </div>
        <div class="profile-content">
          <div class="profile-card">
            <div class="profile-title">${escapeHtml(plug.name)}</div>
            <div class="stars">${starsForVotes(plug.votes || 0)}</div>
            <div class="profile-meta">📍 ${escapeHtml(plug.city || "France")} • 📌 ${escapeHtml(plug.sector || "Secteur non renseigné")} • 🗳️ ${formatNumber(plug.votes || 0)} vote</div>
            <div class="profile-desc">${escapeHtml(plug.description || "Aucune description pour le moment.")}</div>
            <div class="link-grid">${links.length ? links.join("") : `<div class="empty">Aucun lien renseigné.</div>`}</div>
          </div>
        </div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("searchInput").addEventListener("input", () => {
      const value = document.getElementById("searchInput").value.toLowerCase();
      const filtered = allPlugs.filter(plug => `${plug.name} ${plug.city} ${plug.sector}`.toLowerCase().includes(value));
      renderPlugs(filtered);
      renderPodium(filtered);
    });

    document.getElementById("navHome").addEventListener("click", () => showRanking(true));
    document.getElementById("navRanking").addEventListener("click", () => showRanking(false));
    document.getElementById("navNetworks").addEventListener("click", showNetworks);
  </script>
</body>
</html>
