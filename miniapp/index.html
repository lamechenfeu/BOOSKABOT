<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BSP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #05070d;
      color: white;
      padding-bottom: 96px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40px;
      background:
        linear-gradient(rgba(5,7,13,.86), rgba(5,7,13,.95)),
        url("bsp.png") center/cover no-repeat;
      filter: blur(18px);
      transform: scale(1.08);
      opacity: .42;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(180,0,255,.18), transparent 34%),
        linear-gradient(to bottom, rgba(5,7,13,.05), #05070d 92%);
      z-index: -1;
      pointer-events: none;
    }

    .loading {
      position: fixed;
      inset: 0;
      background: #05070d;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .loader-logo {
      width: 92px;
      height: 92px;
      border-radius: 26px;
      background: url("bsp.png") center/cover no-repeat;
      box-shadow: 0 0 45px rgba(190, 0, 255, .75);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .loading p {
      color: #cfd8e6;
      font-size: 13px;
      font-weight: 800;
      margin-top: 18px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .86; }
    }

    .app {
      display: none;
      animation: appEnter .8s ease;
    }

    @keyframes appEnter {
      from { opacity: 0; transform: translateY(-38px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      height: 270px;
      position: relative;
      background:
        linear-gradient(to bottom, rgba(5,7,13,.05), #05070d 96%),
        url("bsp.png") center/cover no-repeat;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -20px;
      backdrop-filter: blur(2px);
      background: rgba(0,0,0,.18);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 52%, rgba(189,0,255,.16), transparent 30%),
        linear-gradient(to bottom, transparent, #05070d);
    }

    .hero-glass {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 12px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(8, 13, 24, .76);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(16px);
      z-index: 2;
      box-shadow: 0 20px 55px rgba(0,0,0,.45);
      animation: slideDown .9s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-80px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-title {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 8px;
      color: #fff;
      text-shadow:
        0 0 12px rgba(180,0,255,.95),
        0 0 28px rgba(180,0,255,.55);
      animation: neonMove 1.3s ease;
    }

    .hero-title small {
      display: block;
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.35;
      color: #d9b7ff;
      letter-spacing: .4px;
      text-shadow: 0 0 14px rgba(180,0,255,.8);
    }

    @keyframes neonMove {
      from { opacity: 0; transform: translateX(-80px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .hero-sub {
      color: #9fc7dd;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .content {
      padding: 14px 16px 0;
      animation: contentDrop .9s ease;
    }

    @keyframes contentDrop {
      from { opacity: 0; transform: translateY(-42px); }
      to { opacity: 1; transform: translateY(0); }
    }    .section-title {
      margin: 12px 0 12px;
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title span {
      font-size: 12px;
      color: #8ea4bd;
      font-weight: 800;
    }

    .search-box {
      margin: 12px 0 16px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: white;
      outline: none;
      font-size: 14px;
      font-weight: 800;
      box-shadow: inset 0 0 20px rgba(0,0,0,.22);
    }

    .search-box input::placeholder {
      color: rgba(210,220,235,.45);
    }

    .plug-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .plug-card {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      min-height: 185px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 20px 55px rgba(0,0,0,.35);
      animation: cardIn .55s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .plug-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(.52);
      transform: scale(1.04);
    }

    .plug-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(3,5,10,.96), rgba(3,5,10,.35)),
        radial-gradient(circle at top right, rgba(180,0,255,.35), transparent 38%);
    }

    .plug-content {
      position: relative;
      z-index: 2;
      padding: 16px;
      min-height: 185px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .rank {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      backdrop-filter: blur(10px);
    }

    .votes {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0, 217, 255, .16);
      border: 1px solid rgba(0, 217, 255, .35);
      font-size: 12px;
      font-weight: 900;
      color: #dff9ff;
      backdrop-filter: blur(10px);
    }

    .plug-name {
      font-size: 23px;
      font-weight: 900;
      margin-bottom: 5px;
      text-shadow: 0 0 18px rgba(180,0,255,.75);
    }

    .plug-meta {
      font-size: 12px;
      color: #c7d4e6;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .plug-desc {
      font-size: 13px;
      color: #dce7f5;
      line-height: 1.35;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 900;
      font-size: 12px;
      color: white;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
    }

    .btn.primary {
      background: linear-gradient(90deg, #7b2cff, #00d9ff);
      box-shadow: 0 0 22px rgba(0,217,255,.25);
    }

    .empty {
      margin-top: 28px;
      padding: 28px 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      text-align: center;
      color: #aebbd0;
      font-size: 14px;
      font-weight: 800;
    }    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      height: 70px;
      border-radius: 26px;
      background: rgba(8, 13, 24, .86);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px;
      z-index: 50;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    .nav-btn {
      border: none;
      border-radius: 20px;
      background: transparent;
      color: #8fa5bd;
      font-size: 11px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }

    .nav-btn.active {
      color: white;
      background: linear-gradient(135deg, rgba(123,44,255,.65), rgba(0,217,255,.28));
      box-shadow: inset 0 0 18px rgba(255,255,255,.08);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 1000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 460px;
      max-height: 88vh;
      overflow-y: auto;
      border-radius: 28px 28px 0 0;
      background: #0b0f1c;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 -20px 60px rgba(0,0,0,.55);
      animation: modalUp .32s ease;
    }

    @keyframes modalUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-img {
      height: 230px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .modal-img::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #0b0f1c, transparent 65%);
    }

    .modal-body {
      padding: 18px;
    }

    .modal-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
      text-shadow: 0 0 18px rgba(180,0,255,.7);
    }

    .modal-meta {
      color: #9fb1c7;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .modal-desc {
      color: #dde7f4;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: grid;
      gap: 10px;
    }

    .modal-actions a,
    .modal-actions button {
      display: block;
      width: 100%;
      text-decoration: none;
      text-align: center;
      border: none;
      border-radius: 16px;
      padding: 14px;
      color: white;
      font-size: 14px;
      font-weight: 900;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
    }

    .modal-actions .vote-action {
      background: linear-gradient(90deg, #7b2cff, #00d9ff);
    }

    .close-btn {
      margin-top: 10px;
      background: rgba(255,255,255,.06) !important;
      color: #bac7d9 !important;
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">
    <div class="loader-logo"></div>
    <p>Chargement de BSP...</p>
  </div>

  <div id="app" class="app">
    <section class="hero">
      <div class="hero-glass">
        <div class="hero-title">
          BOOSKABOT
          <small>La plateforme officielle BSP</small>
        </div>
        <div class="hero-sub">Classement • Plugs • Votes</div>
      </div>
    </section>

    <main class="content">
      <div class="section-title">
        <div>🔥 Top Plugs</div>
        <span id="plugCount">0 plug</span>
      </div>

      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Rechercher un plug, une ville, un secteur..." />
      </div>

      <div id="plugList" class="plug-list"></div>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showHome()">🏠<span>Accueil</span></button>
    <button class="nav-btn" onclick="reloadPlugs()">🔄<span>Refresh</span></button>
    <button class="nav-btn" onclick="openTelegram()">✈️<span>Telegram</span></button>
  </nav>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div id="modalImg" class="modal-img"></div>
      <div class="modal-body">
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalMeta" class="modal-meta"></div>
        <div id="modalDesc" class="modal-desc"></div>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>
  </div>  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#05070d");
      tg.setBackgroundColor("#05070d");
    }

    let plugs = [];

    async function loadPlugs() {
      try {
        const res = await fetch("https://booskabot.onrender.com/plugs");
        plugs = await res.json();

        renderPlugs(plugs);

        document.getElementById("plugCount").textContent =
          `${plugs.length} plug${plugs.length > 1 ? "s" : ""}`;

      } catch (e) {
        document.getElementById("plugList").innerHTML = `
          <div class="empty">
            Impossible de charger les plugs.
          </div>
        `;
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("app").style.display = "block";
    }

    function renderPlugs(list) {

      if (!list.length) {
        document.getElementById("plugList").innerHTML = `
          <div class="empty">
            Aucun plug disponible.
          </div>
        `;
        return;
      }

      document.getElementById("plugList").innerHTML =
        list.map((plug, index) => `
          <div class="plug-card">

            <div class="plug-bg"
                 style="background-image:url('${plug.image || "bsp.png"}')">
            </div>

            <div class="rank">
              #${index + 1}
            </div>

            <div class="votes">
              🗳️ ${plug.votes || 0}
            </div>

            <div class="plug-content">

              <div class="plug-name">
                ${plug.name}
              </div>

              <div class="plug-meta">
                📍 ${plug.city || "-"} • 📌 ${plug.sector || "-"}
              </div>

              <div class="plug-desc">
                ${(plug.description || "").substring(0,120)}
              </div>

              <div class="btn-row">

                <button class="btn primary"
                  onclick="openPlug(${plug.id})">
                  Voir
                </button>

                <button class="btn"
                  onclick="voteLink(${plug.id})">
                  Voter
                </button>

              </div>

            </div>

          </div>
        `).join("");
    }

    function openPlug(id){

      const plug = plugs.find(p => String(p.id) === String(id));

      if(!plug) return;

      document.getElementById("modal").classList.add("show");

      document.getElementById("modalImg").style.backgroundImage =
        `url('${plug.image || "bsp.png"}')`;

      document.getElementById("modalTitle").textContent =
        plug.name;

      document.getElementById("modalMeta").textContent =
        `📍 ${plug.city || "-"} • 📌 ${plug.sector || "-"} • 🗳️ ${plug.votes || 0}`;

      document.getElementById("modalDesc").textContent =
        plug.description || "";

      let html = "";

      html += `
        <button class="vote-action"
          onclick="voteLink(${plug.id})">
          🗳️ Voter pour ce plug
        </button>
      `;

      if(plug.telegram){
        html += `
          <a href="${plug.telegram}" target="_blank">
            🔗 Telegram
          </a>
        `;
      }

      if(plug.instagram){
        html += `
          <a href="${plug.instagram}" target="_blank">
            📸 Instagram
          </a>
        `;
      }

      if(plug.potato){
        html += `
          <a href="${plug.potato}" target="_blank">
            🥔 Potato
          </a>
        `;
      }

      if(plug.luffa){
        html += `
          <a href="${plug.luffa}" target="_blank">
            🟣 Luffa
          </a>
        `;
      }

      html += `
        <button class="close-btn"
          onclick="closeModal()">
          Fermer
        </button>
      `;

      document.getElementById("modalActions").innerHTML = html;
    }

    function closeModal(){
      document.getElementById("modal").classList.remove("show");
    }

    function voteLink(id){
      window.open(
        `https://t.me/BSPStartBot?start=plug_${id}`,
        "_blank"
      );
    }

    function reloadPlugs(){
      loadPlugs();
    }

    function showHome(){
      window.scrollTo({
        top:0,
        behavior:"smooth"
      });
    }

    function openTelegram(){

      if(tg && tg.openTelegramLink){
        tg.openTelegramLink("https://t.me/booskaplugbot");
        return;
      }

      window.location.href =
        "https://t.me/booskaplugbot";
    }

    document
      .getElementById("searchInput")
      .addEventListener("input",e=>{

        const q=e.target.value.toLowerCase();

        renderPlugs(

          plugs.filter(p=>

            (p.name||"").toLowerCase().includes(q) ||

            (p.city||"").toLowerCase().includes(q) ||

            (p.sector||"").toLowerCase().includes(q)

          )

        );

      });

    loadPlugs();

  </script>

</body>
</html>
