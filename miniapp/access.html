<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BSP Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0d16;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40px;
      background:
        linear-gradient(rgba(5,7,13,.82), rgba(5,7,13,.94)),
        url("bsp.png") center/cover no-repeat;
      filter: blur(16px);
      transform: scale(1.08);
      opacity: .55;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(180,0,255,.24), transparent 34%),
        linear-gradient(to bottom, rgba(5,7,13,.1), #05070d);
      z-index: -1;
    }

    .box {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      animation: fadeUp .55s ease;
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 28px;
      background: url("bsp.png") center/cover no-repeat;
      box-shadow: 0 0 45px rgba(180, 0, 255, .75);
      animation: pulse 1.25s infinite ease-in-out;
    }

    .loader {
      width: 46px;
      height: 46px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.12);
      border-top-color: #28c7ff;
      animation: spin 1s linear infinite;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      text-shadow: 0 0 18px rgba(180,0,255,.9);
    }

    p {
      margin: 12px auto 0;
      max-width: 310px;
      color: #a9b6c8;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .join {
      display: none;
      margin-top: 26px;
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      color: white;
      font-size: 15px;
      font-weight: 900;
      background: linear-gradient(90deg, #008cff, #00d9ff);
      box-shadow: 0 0 28px rgba(0,217,255,.35);
    }

    .small {
      margin-top: 18px;
      font-size: 11px;
      color: rgba(180,190,205,.55);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .86; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <main class="box">
    <div class="logo"></div>
    <div id="loader" class="loader"></div>

    <h1 id="title">Préparation...</h1>
    <p id="text">Vérification de votre accès BSP...</p>

    <button id="joinBtn" class="join" onclick="openBSP(true)">
      Rejoindre BSP
    </button>

    <div class="small">Plateforme officielle BSP</div>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    const botLink = "https://t.me/booskaplugbot";
    const apiUrl = "https://booskabot.onrender.com/check-user";

    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#05070d");
      tg.setBackgroundColor("#05070d");
    }

    function getTelegramUserId() {
      try {
        return tg?.initDataUnsafe?.user?.id || null;
      } catch (e) {
        return null;
      }
    }

    function openBSP(markJoined = false) {
      if (markJoined) {
        localStorage.setItem("bsp_join_clicked", "1");
      }

      if (tg && tg.openTelegramLink) {
        tg.openTelegramLink(botLink);
      } else {
        window.location.href = botLink;
      }
    }

    async function checkUserExists(userId) {
      try {
        const res = await fetch(`${apiUrl}?id=${encodeURIComponent(userId)}`);
        const data = await res.json();
        return data.exists === true;
      } catch (e) {
        return false;
      }
    }

    async function startAccessFlow() {
      const userId = getTelegramUserId();

      let exists = false;

      if (userId) {
        exists = await checkUserExists(userId);
      }

      setTimeout(() => {
        if (exists) {
          document.getElementById("title").textContent = "Accès validé";
          document.getElementById("text").textContent = "Ouverture de BSP...";
          openBSP(false);

          setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            document.getElementById("text").textContent =
              "Si BSP ne s'ouvre pas automatiquement, touchez le bouton ci-dessous.";
            document.getElementById("joinBtn").style.display = "block";
          }, 1500);

          return;
        }

        document.getElementById("loader").style.display = "none";
        document.getElementById("title").textContent = "Invitation prête";
        document.getElementById("text").textContent =
          "Votre invitation est prête. Touchez le bouton ci-dessous pour rejoindre BSP.";
        document.getElementById("joinBtn").style.display = "block";
      }, 1800);
    }

    startAccessFlow();
  </script>
</body>
</html>
