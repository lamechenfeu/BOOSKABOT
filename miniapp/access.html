<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accès Telegram</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #2b0050, #050008 55%, #000);
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 420px;
      padding: 30px 22px;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 24px;
      border-radius: 50%;
      box-shadow: 0 0 35px rgba(180, 0, 255, 0.8);
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid #b600ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 22px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 12px;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 16px;
      opacity: 0.85;
      margin: 0;
      line-height: 1.5;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.55;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="./logo.png" alt="BOOSKABOT" class="logo" />

    <div class="loader"></div>

    <h1>Connexion Telegram...</h1>
    <p>Accès au canal en cours.<br>Veuillez patienter quelques secondes.</p>

    <div class="small">BOOSKABOT sécurise votre redirection</div>
  </div>

  <script>
    const TELEGRAM_LINK = "https://t.me/+aIfKkK6E6XplYmM8";

    const tg = window.Telegram && window.Telegram.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
    }

    setTimeout(() => {
      window.location.href = TELEGRAM_LINK;
    }, 1800);
  </script>
</body>
</html>
