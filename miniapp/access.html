<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>BSP Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #2a0045, #05070d 65%);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .box {
      padding: 26px;
      animation: fadeUp .6s ease;
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 18px;
      border-radius: 28px;
      background: url("bsp.png") center/cover no-repeat;
      box-shadow: 0 0 45px rgba(180, 0, 255, .8);
      animation: pulse 1.2s infinite ease-in-out;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      text-shadow: 0 0 18px #b400ff;
    }

    p {
      color: #b9c5d6;
      font-size: 14px;
      margin-top: 10px;
    }

    .loader {
      width: 46px;
      height: 46px;
      margin: 26px auto 0;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.12);
      border-top-color: #00d9ff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: .85; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="logo"></div>
    <h1>BSP 🔌</h1>
    <p>Connexion à la plateforme officielle...</p>
    <div class="loader"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor("#05070d");
      tg.setBackgroundColor("#05070d");
    }

    setTimeout(() => {
      window.location.href = "https://t.me/booskaplugbot";
    }, 1600);
  </script>
</body>
</html>
